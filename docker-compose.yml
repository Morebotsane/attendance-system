version: '3.8'

services:
  # Backend Application
  backend:
    build: ./backend
    container_name: attendance_backend
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
    environment:
      - DATABASE_URL=postgresql://postgres:postgres@db:5432/attendance_db
      - REDIS_URL=redis://redis:6379/0
      - SECRET_KEY=your_secret_key # Change this in production
      - ALGORITHM=HS256
      - ACCESS_TOKEN_EXPIRE_MINUTES=30
    networks:
      - attendance_network
    restart: on-failure

  # PostgreSQL Database
  db:
    image: postgres:15-alpine
    container_name: attendance_db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: attendance_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - attendance_network

  # Redis for caching and Celery broker
  redis:
    image: redis:7-alpine
    container_name: attendance_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - attendance_network

volumes:
  postgres_data:
  redis_data:

networks:
  attendance_network:
    driver: bridge
